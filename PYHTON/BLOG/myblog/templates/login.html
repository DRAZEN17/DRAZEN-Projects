{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BlogSpace</title>
    <link rel="stylesheet" href="{% static "css/login.css" %}">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container header-content">
            <div class="logo">BlogSpace</div>
        </div>
    </header>

    <!-- Auth Container -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back!</h1>
                <p>Sign in to access your account</p>
            </div>
            
            <form class="auth-form" method="POST" action{% url 'login' %}>
                {% csrf_token %}
                <div class="form-group">
                    <label for="login-email">Username</label>
                    <input type="text" id="login-email" name='username' class="form-control" placeholder="Enter your Username" required>
                </div>
                
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="password-input">
                        <input type="password" name='password' id="login-password" class="form-control" placeholder="Enter your password" required>
                        <span class="toggle-password" onclick="togglePassword('login-password')">👁️</span>
                    </div>
                </div>
                
                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>
                
                <button type="submit" class="submit-btn">Login</button>
                
                {% comment %} <div class="divider">
                    <span>Or continue with</span>
                </div>
                
                <div class="social-auth">
                    <button type="button" class="social-btn google">
                        Google
                    </button>
                    <button type="button" class="social-btn facebook">
                        Facebook
                    </button>
                </div> {% endcomment %}
                {% if messages %} 
                    <div class="messages">
                        {% for message in messages %}
                        <div class="alert {{ message.tags }}">
                            {{ message }}
                        </div>
                        {% endfor %}
                    </div>
                {% endif %}   
                
                <div class="auth-footer">
                    Don't have an account? <a href="{% url 'signup' %}">Sign up</a>
                </div>
            </form>
        </div>
    </div>

    <script src="{% static "js/login.js" %}"></script>
</body>
</html>
