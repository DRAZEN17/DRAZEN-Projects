version: "3.9"
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes: ["mongo_data:/data/db"]

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/portfolio
      - PORT=5000
    ports: ["5000:5000"]
    depends_on: [mongo]

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports: ["8080:80"]
    depends_on: [backend]

volumes:
  mongo_data:
