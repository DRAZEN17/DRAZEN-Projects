server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  # Public app
  location / { try_files $uri /index.html; }

  # Example: enable HTTP Basic Auth for admin routes (recommended when hosting
  # the static build behind nginx). To use:
  # 1. create an htpasswd file: `htpasswd -c /etc/nginx/.htpasswd <username>`
  #    (install apache2-utils / httpd-tools to get `htpasswd`).
  # 2. mount the file into the container or place it at /etc/nginx/.htpasswd.
  # 3. uncomment the block below and reload nginx.
  #
  # location ~ ^/(admin|login) {
  #   auth_basic "Admin area";
  #   auth_basic_user_file /etc/nginx/.htpasswd;
  #   try_files $uri /index.html;
  # }
}
}
